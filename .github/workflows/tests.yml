name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    name: pytest (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: consensus
            test_target: tests/test_consensus_estimates.py
          - name: dcf
            test_target: tests/test_dcf_engine.py
          - name: pdf_export
            test_target: tests/test_pdf_export.py
          - name: yf_cache
            test_target: tests/test_yf_cache.py

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest ${{ matrix.test_target }}
